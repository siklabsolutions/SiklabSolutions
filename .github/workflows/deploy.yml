name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: siklab-react
        run: npm install

      - name: Build React frontend
        working-directory: siklab-react
        run: npm run build

  deploy:
    needs: build
    runs-on: [self-hosted, windows]
    steps:

      - name: Deploy to Hostinger
        shell: pwsh
        env:
          HOST: ${{ secrets.HOSTINGER_HOST || '195.35.62.124' }}
          HOST_USER: ${{ secrets.HOSTINGER_USERNAME || 'u160668427' }}
          DEPLOYMENT_PATH: ${{ secrets.DEPLOYMENT_PATH || '/home/u160668427/public_html/siklab' }}
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY || secrets.HOSTINGER_PRIVATE_KEY || vars.HOSTINGER_SSH_KEY || vars.HOSTINGER_PRIVATE_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:SSH_PRIVATE_KEY)) {
            throw "Missing HOSTINGER_SSH_KEY secret"
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "hostinger_deploy_key"
          [System.IO.File]::WriteAllText($keyPath, $env:SSH_PRIVATE_KEY)

          $remoteScript = @"
set -e
export PATH=\$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:\$PATH

cd '$env:DEPLOYMENT_PATH'
git pull origin main

command -v npm >/dev/null 2>&1 || { echo "npm is not available in PATH"; exit 1; }

cd siklab-react
npm install
npm run build

cp -r dist/* \$HOME/public_html/
echo "Deployment completed at \$(date)" >> ../deployment.log
"@

          ssh -o StrictHostKeyChecking=accept-new -i "$keyPath" -p 65002 "$($env:HOST_USER)@$($env:HOST)" $remoteScript

      - name: Deployment Status Notification
        if: always()
        shell: pwsh
        run: |
          if ("${{ job.status }}" -eq "success") {
            Write-Output "Deployment to Hostinger completed successfully!"
          else
            Write-Output "Deployment failed!"
          }
