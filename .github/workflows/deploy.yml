name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        working-directory: siklab-react
        run: npm install

      - name: Build React frontend
        working-directory: siklab-react
        run: npm run build

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy to Hostinger
        shell: powershell
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          DEPLOYMENT_PATH: ${{ secrets.DEPLOYMENT_PATH }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_PRIVATE_KEY: ${{ secrets.HOSTINGER_PRIVATE_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          $hostName = $env:HOSTINGER_HOST
          if ([string]::IsNullOrWhiteSpace($hostName)) { $hostName = "195.35.62.124" }

          $hostUser = $env:HOSTINGER_USERNAME
          if ([string]::IsNullOrWhiteSpace($hostUser)) { $hostUser = "u160668427" }

          $deployPath = $env:DEPLOYMENT_PATH
          if ([string]::IsNullOrWhiteSpace($deployPath)) { $deployPath = "/home/u160668427/public_html/siklab" }

          $privateKey = $env:HOSTINGER_SSH_KEY
          if ([string]::IsNullOrWhiteSpace($privateKey)) { $privateKey = $env:HOSTINGER_PRIVATE_KEY }
          if ([string]::IsNullOrWhiteSpace($privateKey)) { throw "Missing HOSTINGER_SSH_KEY / HOSTINGER_PRIVATE_KEY secret" }

          # Normalize key text from GitHub Secrets (supports pasted multiline and escaped \n variants).
          $privateKey = $privateKey.Trim()
          if (($privateKey.StartsWith('"') -and $privateKey.EndsWith('"')) -or ($privateKey.StartsWith("'") -and $privateKey.EndsWith("'"))) {
            $privateKey = $privateKey.Substring(1, $privateKey.Length - 2)
          }
          $privateKey = $privateKey -replace "`r`n", "`n"
          $privateKey = $privateKey -replace "`r", "`n"
          $privateKey = $privateKey -replace "\\n", "`n"

          if ($privateKey -notmatch "-----BEGIN .*PRIVATE KEY-----") {
            throw "SSH key format looks invalid. Re-save HOSTINGER_SSH_KEY as the full private key including BEGIN/END lines."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "hostinger_deploy_key"
          [System.IO.File]::WriteAllText($keyPath, $privateKey + "`n")

          # Restrict key file ACL so OpenSSH accepts the private key on Windows.
          $currentUser = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /remove "BUILTIN\Users" "Authenticated Users" "Everyone" | Out-Null
          icacls $keyPath /grant:r "$currentUser`:(R)" "SYSTEM`:(R)" | Out-Null

          $remoteScript = "set -e; export PATH=\$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:\$PATH; cd '$deployPath'; git pull origin main; command -v npm >/dev/null 2>&1 || { echo 'npm is not available in PATH'; exit 1; }; cd siklab-react; npm install; npm run build; cp -r dist/* \$HOME/public_html/; echo 'Deployment completed at \$(date)' >> ../deployment.log"

          ssh -o StrictHostKeyChecking=accept-new -i "$keyPath" -p 65002 "$hostUser@$hostName" $remoteScript
